version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: qbwc
      POSTGRES_PASSWORD: qbwc_secret
      POSTGRES_DB: qbwc_bridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qbwc -d qbwc_bridge"]
      interval: 5s
      timeout: 5s
      retries: 5

  bridge:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      PUBLIC_URL: http://localhost:3000
      DATABASE_URL: postgres://qbwc:qbwc_secret@db:5432/qbwc_bridge
      SESSION_SECRET: change_me_in_production_32_characters
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-}
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run db:migrate && node dist/app.js"

volumes:
  pgdata:
