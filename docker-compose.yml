name: qbwc-bridge

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qbwc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qbwc_bridge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qbwc} -d ${POSTGRES_DB:-qbwc_bridge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bridge:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node dist/db/migrate.js && node dist/app.js"
    restart: unless-stopped

volumes:
  pgdata:
